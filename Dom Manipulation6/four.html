<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom manipulation list item </title>
</head>
<body style="background-color: rgb(255, 255, 255);">
    <ul class="language">
        <li> javascript</li>
    </ul>
  
</body>
<script>
    function addLanguage(langname){
       const li = document.createElement("li");
       li.innerHTML= `${langname}`;
       document.querySelector('.language').appendChild(li);
    }
    addLanguage('python');
    addLanguage('java');
    addLanguage('c++');
    addLanguage('c#');
    addLanguage('php');


     function optilanguage(langname){
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(langname));
        document.querySelector('.language').appendChild(li);
     }
     optilanguage('ruby');
     optilanguage('go');
     // edit value
      const secondlng = document.querySelector("li:nth-child(2)");
      //  secondlng.innerHTML = "typescript";
       const newelement = document.createElement("li");
       newelement.textContent = "typescript";
       secondlng.replaceWith(newelement);
       // edit 
       const firstdlng = document.querySelector("li:first-child");
        firstdlng.outerHTML = "<li>HTML</li>";

        // remove element
        const lastlang = document.querySelector("li:last-child");
        lastlang.remove();

</script>
    
</html>
